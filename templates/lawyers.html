<!DOCTYPE html>

<html>

<head>
    <title>{{ category.name }} Lawyers</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
            margin: 0;
        }

        .header {
            background: linear-gradient(90deg, #4a6cf7, #6a8bff);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .info {
            color: #555;
            margin-bottom: 8px;
        }

        button {
            background: #4a6cf7;
            border: none;
            padding: 10px 18px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #324ed1;
        }

        .back {
            text-align: center;
            margin-top: 40px;
        }

        .back a {
            text-decoration: none;
            background: #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
        }
    </style>

</head>

<body>

    <div class="header">
        {{ category.name }} Lawyers
    </div>

    <div class="container">

        {% for lawyer in lawyers %}

        <div class="card">

            <h3>{{ lawyer.name }}</h3>

            <p class="info"><b>Experience:</b> {{ lawyer.experience }} years</p>

            <p class="info"><b>Email:</b> {{ lawyer.email }}</p>

            <p class="info"><b>Phone:</b> {{ lawyer.phone }}</p>
            <p class="info"><b>Address:</b> {{ lawyer.address }}</p>

            <a href="/consult/{{ lawyer.id }}/">
                <button>Consult Lawyer</button>
            </a>

        </div>

        {% empty %}

        <p>No lawyers available in this category.</p>

        {% endfor %}

    </div>


    <div class="back">
        <a href="/dashboard/">⬅ Back to Dashboard</a>
    </div>

</body>

</html>
