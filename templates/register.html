<!DOCTYPE html>

<html>

<head>
    <title>LexConnect Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #5f2c82, #49a09d);
        }

        .container {
            width: 380px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            border-color: #5f2c82;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5f2c82;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #4a2168;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            text-decoration: none;
            color: #5f2c82;
            font-weight: bold;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Create Account</h2>

        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}


        <form method="POST">

            {% csrf_token %}

            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Register</button>

        </form>

        <div class="login-link">
            Already have an account? <a href="/login/">Login</a>
        </div>

    </div>

</body>

</html>
