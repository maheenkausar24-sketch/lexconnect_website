<!DOCTYPE html>

<html>
<head>
<title>Consult {{ lawyer.name }}</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#4a6cf7,#6a8bff);
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:400px;
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:12px;
background:#4a6cf7;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#324ed1;
}

.back{
margin-top:15px;
text-align:center;
}

.back a{
text-decoration:none;
color:#4a6cf7;
}

</style>

</head>

<body>

<div class="container">

<h2>Consult {{ lawyer.name }}</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="issue" placeholder="Describe your legal issue..." required></textarea>

<button type="submit">Submit Consultation</button>

</form>

<div class="back">
<a href="/dashboard/">← Back to Dashboard</a>
</div>

</div>

</body>
</html>
