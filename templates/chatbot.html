<!DOCTYPE html>

<html>

<head>
<title>Lexora AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4b6cb7,#8e44ad);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:700px;
height:720px;
background:white;
border-radius:15px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.chat-header{
background:#4b6cb7;
color:white;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.new-chat-btn{
background:#ff6b6b;
border:none;
color:white;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
background:#f4f6ff;
}

.message{
padding:10px 15px;
margin:10px 0;
border-radius:15px;
max-width:70%;
}

.user{
background:#4b6cb7;
color:white;
margin-left:auto;
}

.bot{
background:#e5e5ea;
}

.controls{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #ddd;
}

.controls input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
}

.mic-btn{
background:#e74c3c;
border:none;
color:white;
padding:10px 15px;
border-radius:50%;
cursor:pointer;
}

.send-btn{
background:#2ecc71;
border:none;
color:white;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">
<span>Lexora AI 🤖</span>
<button onclick="newChat()" class="new-chat-btn">New Chat</button>
</div>

<div id="chat-box" class="chat-box">

<div class="message bot">
Hello! I am <b>Lexora AI</b>. Ask me about legal issues and I will guide you.
</div>

</div>

<div class="controls">

<input type="text" id="question" placeholder="Type or speak your legal question">

<button class="mic-btn" onclick="startListening()">🎤</button>

<button class="send-btn" onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const chatBox=document.getElementById("chat-box")

function addMessage(text,type){

let msg=document.createElement("div")
msg.className="message "+type
msg.innerText=text

chatBox.appendChild(msg)

chatBox.scrollTop=chatBox.scrollHeight

}

function sendMessage(){

let input=document.getElementById("question")
let question=input.value.trim()

if(question==="") return

addMessage(question,"user")

input.value=""

fetch("/ask-lexora/",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded",
"X-CSRFToken":getCookie("csrftoken")
},

body:"question="+encodeURIComponent(question)

})

.then(res => res.json())

.then(data => {

    
    addMessage(data.answer, "bot")
    speakText(data.answer)

    // show recommended lawyers
    if (data.lawyers && data.lawyers.length > 0) {

        let lawyerText = "Recommended Lawyers:\n\n"

        data.lawyers.forEach(l => {
            lawyerText += `${l.name} (${l.experience} yrs) - ${l.location}\n`
            lawyerText += `Email: ${l.email}\n`
            lawyerText += `Phone: ${l.phone}\n\n`
        })

        addMessage(lawyerText, "bot")
    }

})

.catch(() => {
    addMessage("Server error. Try again.", "bot")
})

}

function speakText(text){

let speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"
speech.rate=1
speech.pitch=1

window.speechSynthesis.cancel()  // Stop any ongoing speech
window.speechSynthesis.speak(speech)

}

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition not supported")
return
}

const recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

let speechText=event.results[0][0].transcript

document.getElementById("question").value=speechText

}

}

function newChat(){

chatBox.innerHTML=`
<div class="message bot">
Hello! I am <b>Lexora AI</b>. Ask me about legal issues and I will guide you.
</div>
`

}

function getCookie(name){

let cookieValue=null

if(document.cookie && document.cookie!==""){

let cookies=document.cookie.split(";")

for(let i=0;i<cookies.length;i++){

let cookie=cookies[i].trim()

if(cookie.substring(0,name.length+1)===(name+"=")){

cookieValue=decodeURIComponent(cookie.substring(name.length+1))

break

}

}

}

return cookieValue

}

</script>

</body>

</html>
